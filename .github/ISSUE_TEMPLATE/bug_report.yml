name: Bug report
description: Report a reproducible problem in Clipora
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include private clipboard contents, personal files, credentials, databases, or unredacted local paths.
  - type: input
    id: version
    attributes:
      label: Clipora version
      placeholder: "0.4.2"
    validations:
      required: true
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other / unknown
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add redacted screenshots or logs only when necessary. Use synthetic content.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed private clipboard data and personal information.
          required: true
        - label: This is not a security vulnerability.
          required: true
