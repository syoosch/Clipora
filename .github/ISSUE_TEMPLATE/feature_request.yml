name: Feature request
description: Suggest an improvement for Clipora
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: This request contains no private clipboard contents or personal files.
          required: true
